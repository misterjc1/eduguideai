<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header card-header-tabs card-header-primary">
                <div class="nav-tabs-navigation">
                    <div class="nav-tabs-wrapper">
                        <span class="nav-tabs-title">{{datatable.title}}</span>
                        <ul class="nav nav-tabs" data-tabs="tabs">
                            <li class="nav-item">
                                <a mat-button class="nav-link " href="#profile" data-toggle="tab"
                                    (click)="showSearch=!showSearch">
                                    <i class="material-icons">search</i> Rechercher
                                    <div class="ripple-container"></div>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">

                    <mat-form-field *ngIf="showSearch">
                        <mat-label>Recherche</mat-label>
                        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. ium">
                    </mat-form-field>
                    <div class="datatable-container mat-elevation-z8">
                        <table mat-table [dataSource]="data" matSort>
                            <!-- Checkbox Column -->
                            <ng-container matColumnDef="select">
                                <th mat-header-cell *matHeaderCellDef>
                                    <mat-checkbox (change)="$event ? masterToggle() : null"
                                        [checked]="selection.hasValue() && isAllSelected()"
                                        [indeterminate]="selection.hasValue() && !isAllSelected()"
                                        [aria-label]="checkboxLabel()">
                                    </mat-checkbox>
                                </th>
                                <td mat-cell *matCellDef="let row">
                                    <mat-checkbox (click)="$event.stopPropagation()"
                                        (change)="$event ? selection.toggle(row) : null"
                                        [checked]="selection.isSelected(row)" [aria-label]="checkboxLabel(row)">
                                    </mat-checkbox>
                                </td>
                            </ng-container>

                            <ng-container [matColumnDef]="column.label" *ngFor="let column of datatable.colonnes">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> {{column.label}} </th>
                                <td mat-cell *matCellDef="let element">
                                    {{element[column.name]?element[column.name]:'-'}} </td>

                            </ng-container>

                            <!-- Checkbox Column -->
                            <ng-container matColumnDef="rowActions" *ngIf="rowActionsToDisplay.length > 0">
                                <th mat-header-cell *matHeaderCellDef class="td-actions text-right"> Action </th>
                                <td mat-cell *matCellDef="let element" class="td-actions text-right">

                                    <button mat-raised-button type="button" matTooltip="Modifier"
                                        [matTooltipPosition]="'above'"
                                        class="btn btn-primary btn-link btn-sm btn-just-icon" (click)="edit(element)" *ngIf="rowActionsToDisplay.indexOf('edit') !== -1">
                                        <i class="material-icons">edit</i>
                                    </button>

                                </td>
                            </ng-container>


                            <tr mat-header-row *matHeaderRowDef="columnsToDisplay; sticky: true"></tr>
                            <tr mat-row *matRowDef="let row; columns: columnsToDisplay;" (click)="selection.toggle(row)"></tr>
                        </table>

                    </div>
                    <div class="mat-elevation-z8">
                        <mat-paginator [pageSizeOptions]="[10, 15, 20]" showFirstLastButtons></mat-paginator>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
