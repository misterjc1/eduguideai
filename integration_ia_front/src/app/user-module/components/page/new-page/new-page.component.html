<div class="card">
    <div class="card-header card-header-primary">
        <h4 class="card-title" *ngIf=!update> Enregistrement d'une page</h4>
        <h4 class="card-title" *ngIf=update>Modification d'une page</h4>
    </div>
</div>

<div class="main-content">
  <div class="container-fluid">
    <div class="card">     
      <div class="card-body">
        <form>
          <div class="form-row">
            <div class="form-group col-md-6">
              <label for="type">Type</label>
              <mat-select [(ngModel)]="page.type" name="type">
                <mat-option *ngIf="update" [value]="page.type" disabled>{{page.type}}</mat-option>
                <mat-option *ngFor="let type of TypePage" [value]="type.value">
                  {{type.viewValue}}
                </mat-option>

              </mat-select>
            </div>
            <div class="form-group col-md-6">
              <label for="father">Page père</label>
              <mat-select [(ngModel)]="page.father" name="father">
                <mat-option *ngIf="page.father" [value]="page.father" disabled>{{(page.father)?page.father.intitule:""}}
                </mat-option>
                <mat-option *ngFor="let pa of pages" [value]="pa">
                  {{pa.intitule}}
                </mat-option>

              </mat-select>

            </div>
          </div>

          <div class="form-row">
            <div class="form-group col-md-6">
              <label for="intitule">Intitule</label>
              <input class="form-control" type="text" [(ngModel)]="page.intitule" name="intitule">
            </div>
            <div class="form-group col-md-6">
              <label for="key">Clé</label>
              <input class="form-control" type="text" [(ngModel)]="page.key" name="key">
            </div>
          </div>          
        </form>
      </div>
    </div>
  </div>
</div>

<mat-dialog-actions align="end">
    <button mat-raised-button type="submit" class="btn btn-primary pull-right"
            (click)="onSubmit()">Enregistrer</button>
</mat-dialog-actions>
