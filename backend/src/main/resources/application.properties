# ============================================================
# VENEEM - Configuration Spring Boot
# ============================================================

# --- Spring AI — Gemini via OpenAI-compatible API ---
spring.ai.openai.chat.enabled=true
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
spring.ai.openai.api-key=${GEMINI_API_KEY}
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.openai.chat.options.temperature=0.7

# Ollama désactivé
spring.ai.ollama.chat.enabled=false
spring.ai.ollama.chat.model=llama3

# --- Base de données PostgreSQL (local par defaut, surchargeable en prod) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/wouti}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.properties.hibernate.default_schema=ia_schema
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# --- Données de démo : data.sql (jeu de données volumineux, idempotent via ON CONFLICT) ---
# DataLoader.java (JPA) sert de filet de sécurité : il ne s'exécute que si la base est vide.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# --- Connexion pool ---
spring.datasource.hikari.pool-name=HikariPool-VENEEM
spring.datasource.hikari.maximum-pool-size=10

# --- Monitoring ---
management.endpoints.web.exposure.include=prometheus
management.endpoint.health.show-details=always

# --- App ---
mt.application=VENEEM
mt.application.code=IIA
mt.application.env=DEV
mt.application.audit.url=http://localhost:9595
mt.application.notification.url=http://localhost:8585
mt.application.notification.sender=VENEEM

# --- Serveur ---
server.port=8181
server.servlet.context-path=/
spring.devtools.restart.enabled=false

# --- CORS (Angular dev + prod, plusieurs origines separees par virgule) ---
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

logging.level.org.springframework.web.client=warn
