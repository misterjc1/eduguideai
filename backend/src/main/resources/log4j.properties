global.log.level=DEBUG
hibernate.log.level=ERROR

#LogPath PROD
#logs.path=/opt/assurFacil/back-8081/logs

#LogPath Local
logs.path=/Dev/Logs

### direct log messages to stdout ###
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{1},%M,%L] %m%n


log4j.appender.file=org.apache.log4j.DailyRollingFileAppender
log4j.appender.file.File=${logs.path}/CQE.log
log4j.appender.file.DatePattern='.'yyyy-MM-dd
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{1},%M,%L] %m%n
log4j.appender.file.MaxFileSize=60MB
log4j.appender.file.MaxBackupIndex=10
 
 
# Root logger option
log4j.rootLogger=${global.log.level}, stdout, file
 
# Hibernate logging options (INFO only shows startup messages)
log4j.logger.org.hibernate=${hibernate.log.level}
 
# Log JDBC bind parameter runtime arguments----------
log4j.logger.org.hibernate.type=${hibernate.log.level}

### set log levels - for more verbose logging change 'info' to 'debug' ##

log4j.logger.net.sf.hibernate=${hibernate.log.level}

